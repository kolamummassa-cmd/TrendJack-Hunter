{% extends "base.html" %}
{% block title %}Check Your Email — Trendjack Hunter{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6 col-lg-5 text-center">
        <i class="bi bi-envelope-check display-4 text-success mb-3"></i>
        <h4 class="fw-bold mb-2">Check your email</h4>
        <p class="text-muted">
            If an account exists with that email, we've sent a link to reset your password.
            It'll expire in a few hours for security.
        </p>
        <a href="{% url 'accounts:login' %}" class="btn btn-outline-secondary mt-2">Back to login</a>
    </div>
</div>
{% endblock %}
