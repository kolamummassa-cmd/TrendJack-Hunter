{% extends "base.html" %}
{% block title %}Verify Your Email — Trendjack Hunter{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6 col-lg-5">
        <div class="card border-0 shadow-sm">
            <div class="card-body p-4 text-center">
                <i class="bi bi-envelope-check display-5 text-primary mb-3"></i>
                <h4 class="fw-bold mb-2">Check your email</h4>
                <p class="text-muted small mb-4">
                    We sent a 6-digit code to <strong>{{ email }}</strong>.
                    Enter it below to finish creating your account.
                </p>
                <form method="post">
                    {% csrf_token %}
                    <input type="text" name="code" maxlength="6" inputmode="numeric"
                           class="form-control filter-input text-center fs-3 fw-bold mb-3"
                           style="letter-spacing: 0.5rem;" placeholder="000000" autofocus>
                    <button type="submit" class="btn btn-primary w-100">Verify & Create Account</button>
                </form>
                <form method="post" action="{% url 'accounts:resend_signup_code' %}" class="mt-3">
                    {% csrf_token %}
                    <button type="submit" class="btn btn-link btn-sm text-muted">
                        Didn't get it? Resend code
                    </button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
