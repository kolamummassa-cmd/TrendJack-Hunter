{% extends "base.html" %}
{% block title %}Reset Password — Trendjack Hunter{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6 col-lg-5">
        <div class="card border-0 shadow-sm">
            <div class="card-body p-4">
                <h4 class="fw-bold mb-2">Forgot your password?</h4>
                <p class="text-muted small mb-4">
                    Enter your email and we'll send you a link to reset it.
                </p>
                <form method="post" novalidate>
                    {% csrf_token %}
                    <div class="mb-3">
                        <label class="filter-label mb-2">Email address</label>
                        <input type="email" name="email" class="form-control filter-input" required autofocus>
                    </div>
                    <button type="submit" class="btn btn-primary w-100">Send Reset Link</button>
                </form>
                <p class="text-muted small mt-3 mb-0">
                    <a href="{% url 'accounts:login' %}">Back to login</a>
                </p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
